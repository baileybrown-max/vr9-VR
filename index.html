<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>bailey brown VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>


<script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
</head>
<!--vr code below-->
<body>
<a-scene>
<!-- Museum floor starts here -->

<a-entity environment="preset: forest; dressingAmount:1000;seed:50; fog:9.4; dressingcolor:grey;skyColor:lightblue;"horizonColor:white;groundColor:pink;></a-entity>
<a-cylinder id="floor" position="0 0 0" radius="7.5" color="grey" height="0.1"></a-cylinder>
<a-box id="box1" position="0 1.473 4.907" rotation="0 0 0" scale="10 3 0.2" color="white"></a-box>
<a-box id="box1" position="0 1.473 -4.907" rotation="0 0 0" scale="10 3 0.2" color="white"></a-box>
<a-box id="box1" position="5.049 1.454 -0.008" rotation="0 -90 0" scale="10 3 0.2" color="white"></a-box>
<a-box id="box1" position="-5.049 1.454 -0.008" rotation="0 -90 0" scale="10 3 0.2" color="white"></a-box>


<a-cylinder id="triangle_front" segments-radial="3" position="0 3.874 4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" color="white"></a-cylinder>
<a-cylinder id="triangle_back" segments-radial="3" position="0 3.874 -4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" color="white"></a-cylinder>
<a-box id="roof_right" position="2.580 4.328 0" rotation="28.433 90 0" scale="10.931 0.20 6.110" color="grey"></a-box>
<a-box id="roof_left" position="-2.599 4.321 -0.017" rotation="28.433 -90 0" scale="10.931 0.20 6.130" color="grey"></a-box>






</a-scene>
<!-- Movement -->
<!-- Camera + Controllers Rig -->
<a-entity id="rig">
  <!-- Headset view (camera) -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- Left hand laser pointer -->
  <a-entity laser-controls="hand: left"></a-entity>

  <!-- Right hand with thumbstick movement -->
  <a-entity oculus-touch-controls="hand: right" oculus-thumbstick-controls></a-entity>
</a-entity>


</body>
</html>
